{{- /* giscus 评论；配置见 hugo.toml [params.giscus] */ -}}
{{- with .Site.Params.giscus }}
{{- if and .repoId (ne .repoId "REPLACE_WITH_data-repo-id") }}
<script src="https://giscus.app/client.js"
        data-repo="{{ .repo }}"
        data-repo-id="{{ .repoId }}"
        data-category="{{ .category }}"
        data-category-id="{{ .categoryId }}"
        data-mapping="{{ default "pathname" .mapping }}"
        data-strict="{{ default "0" .strict }}"
        data-reactions-enabled="{{ default "1" .reactionsEnabled }}"
        data-emit-metadata="{{ default "0" .emitMetadata }}"
        data-input-position="{{ default "bottom" .inputPosition }}"
        data-theme="{{ if eq site.Params.defaultTheme "dark" }}dark{{ else }}preferred_color_scheme{{ end }}"
        data-lang="{{ default "en" .lang }}"
        crossorigin="anonymous"
        async>
</script>

{{- /* 让 giscus 跟随 PaperMod 的深浅色切换 */ -}}
<script>
  (function () {
    function giscusTheme() {
      return document.body.classList.contains('dark') ? 'dark' : 'light';
    }
    function setGiscusTheme(theme) {
      var iframe = document.querySelector('iframe.giscus-frame');
      if (!iframe) return;
      iframe.contentWindow.postMessage(
        { giscus: { setConfig: { theme: theme } } },
        'https://giscus.app'
      );
    }
    // giscus 首次加载完成后，对齐当前站点主题
    window.addEventListener('message', function (e) {
      if (e.origin !== 'https://giscus.app') return;
      if (e.data && e.data.giscus && 'discussion' in e.data.giscus) {
        setGiscusTheme(giscusTheme());
      }
    });
    // 点击主题切换按钮时同步
    var btn = document.getElementById('theme-toggle');
    if (btn) {
      btn.addEventListener('click', function () {
        setTimeout(function () { setGiscusTheme(giscusTheme()); }, 100);
      });
    }
  })();
</script>
{{- end }}
{{- end }}
